steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/github.com/kitaoka-andmellow/andmellow-dashboard:$COMMIT_SHA
      - -f
      - Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/github.com/kitaoka-andmellow/andmellow-dashboard:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - andmellow-dashboard
      - --image
      - gcr.io/$PROJECT_ID/github.com/kitaoka-andmellow/andmellow-dashboard:$COMMIT_SHA
      - --region
      - asia-northeast1
      - --platform
      - managed
      - --quiet

images:
  - gcr.io/$PROJECT_ID/github.com/kitaoka-andmellow/andmellow-dashboard:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
